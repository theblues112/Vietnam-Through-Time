        <script charset="utf-8" src="https://cdn.plot.ly/plotly-3.6.0.min.js" integrity="sha256-QaOVwtVY0T02VaHrr6pnoHLCwayMJp4O5n4YyaE3rJk=" crossorigin="anonymous"></script>                <div id="d15426d6-5275-4a4a-83ab-f1df47fde242" class="plotly-graph-div" style="height:100%; width:100%;"></div>            <script>                window.PLOTLYENV=window.PLOTLYENV || {};                                if (document.getElementById("d15426d6-5275-4a4a-83ab-f1df47fde242")) {                    Plotly.newPlot(                        "d15426d6-5275-4a4a-83ab-f1df47fde242",                        [{"customdata":[["E0195","1854 CE","Nguy\u1ec5n dynasty \u002f independent monarchy","Military",3,"Cao B\u00e1 Qu\u00e1t Uprising.",12],["E0196","1858 CE","French conquest and early colonial takeover","Military",3,"Cochinchina Campaign.",12],["E0197","1859 CE","French conquest and early colonial takeover","Military",3,"Th\u1ee7 Khoa Hu\u00e2n Uprising.",12],["E0199","1861 CE","French conquest and early colonial takeover","Military",3,"Tr\u01b0\u01a1ng \u0110\u1ecbnh Uprising.",12],["E0435","1873 CE","French conquest and early colonial takeover","Military",5,"After taking Nam K\u1ef3, France expanded into the rest of Vietnam through complex conflicts in B\u1eafc K\u1ef3 from 1873 to 1886.",20],["E0205","1885 CE","French colonial Vietnam \u002f French Indochina","Military",3,"Battle of the Hu\u1ebf Imperial City. H\u00e0m Nghi leads resistance.",12],["E0208","1888 CE","French colonial Vietnam \u002f French Indochina","Military",3,"H\u00e0m Nghi captured and exiled to Algeria.",12],["E0214","1917 CE","French colonial Vietnam \u002f French Indochina","Military",3,"Th\u00e1i Nguy\u00ean uprising.",12],["E0216","1930 CE","French colonial Vietnam \u002f French Indochina","Military",3,"Ngh\u1ec7 T\u0129nh Revolt.",12],["E0441","1930 CE","French colonial Vietnam \u002f French Indochina","Military",4,"The failed Y\u00ean B\u00e1i uprising in 1930 severely weakened Vi\u1ec7t Nam Qu\u1ed1c d\u00e2n \u0110\u1ea3ng.",16],["E0442","1940 CE","French colonial Vietnam \u002f French Indochina","Military",4,"Japan entered Indochina in 1940 and reached an arrangement with Vichy France for control.",16],["E0220","1945 CE","August Revolution and First Indochina War","Military",3,"Allied forces disarm the Japanese in Indochina after World War II, with British-Indian troops operating south of the 16th parallel and Chinese nationalist forces operating north of the 16th parallel.",12],["E0444","1945 CE","French colonial Vietnam \u002f French Indochina","Military",5,"Japan overthrew French colonial administration in March 1945 and backed the Empire of Vietnam.",20],["E0450","1946 CE","August Revolution and First Indochina War","Military",5,"War between the Democratic Republic of Vietnam and France broke out in December 1946 after failed negotiations.",20],["E0222","1954 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",5,"Battle of Dien Bien Phu: French troops begin the battle against the Viet Minh in Dien Bien Phu.",20],["E0223","1954 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",5,"Battle of Dien Bien Phu: the Viet Minh capture the main airstrip of Dien Bien Phu. The remaining French Army units there are partially isolated.",20],["E0225","1954 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",5,"Battle of Dien Bien Phu ends in a French defeat.",20],["E0226","1954 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",5,"The Geneva Conference sends French Union forces to the south, and Viet Minh forces to the north, of a ceasefire line, and calls for elections to decide the government for all of Vietnam by July 1956. Failure to abide by the terms of the agreement leads to the establishment de facto of regimes of North Vietnam and South Vietnam, and the Vietnam War.",20],["E0227","1954 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",3,"The First Indochina War ends with the Vietnam People's Army in North Vietnam, the Vietnamese National Army in South Vietnam, the Kingdom of Cambodia in Cambodia, and the Kingdom of Laos in Laos, emerging victorious against the French Army.",12],["E0228","1955 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",4,"Ng\u00f4 \u0110\u00ecnh Di\u1ec7m proclaims Vietnam to be a republic with himself as its President (following the State of Vietnam referendum on 23 October) and forms the Army of the Republic of Vietnam.",16],["E0229","1955 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",4,"The Vietnam War begins between North Vietnam and South Vietnam; the north is allied with the Viet Cong.",16],["E0230","1959 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",3,"First large unit action of the Vietnam War takes place, when two companies of the ARVN 23d Division are ambushed by a well-organized Viet Cong force of several hundred, identified as the \"2d Liberation Battalion\".",12],["E0231","1960 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",3,"Vietnam War: The United States announces that 3,500 American soldiers will be sent to Vietnam.",12],["E0232","1961 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",3,"Vietnam War: U.S. President John F. Kennedy sends 18,000 military advisors to South Vietnam.",12],["E0233","1961 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",4,"The American involvement in the Vietnam War officially begins, as the first American helicopters arrive in Saigon along with 400 U.S. personnel.",16],["E0234","1963 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",3,"Vietnam War: The Viet Cong win their first major victory in the Battle of Ap Bac.",12],["E0235","1963 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",4,"Hu\u1ebf Ph\u1eadt \u0110\u1ea3n shootings: The Army of the Republic of Vietnam opens fire on Buddhists who defy a ban on the flying of the Buddhist flag on Vesak, the birthday of Gautama Buddha, killing 9. Earlier, President Ng\u00f4 \u0110\u00ecnh Di\u1ec7m allowed the flying of the Vatican flag in honour of his brother, Archbishop Ng\u00f4 \u0110\u00ecnh Th\u1ee5c, triggering the Buddhist crisis in South Vietnam.",16],["E0236","1963 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",4,"Hu\u1ebf chemical attacks: The Army of the Republic of Vietnam rains liquid chemicals on the heads of Buddhist protestors, injuring 67 people. The United States threatens to cut off aid to the regime of Ng\u00f4 \u0110\u00ecnh Di\u1ec7m.",16],["E0239","1963 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",4,"X\u00e1 L\u1ee3i Pagoda raids: The Army of the Republic of Vietnam Special Forces loyal to Ng\u00f4 \u0110\u00ecnh Nhu, brother of President Ng\u00f4 \u0110\u00ecnh Di\u1ec7m, vandalise Buddhist pagodas across South Vietnam, arresting thousands and leaving an estimated hundreds dead. In the wake of the raids, the Kennedy administration by Cable 243 orders the Embassy of the United States, Saigon to explore alternative leadership in the country, opening the way towards a coup against Di\u1ec7m.",16],["E0240","1963 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",3,"1963 South Vietnamese coup d'\u00e9tat: Arrest and assassination of Ngo Dinh Diem, the South Vietnamese President.",12],["E0241","1963 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",3,"1963 South Vietnamese coup d'\u00e9tat: Coup leader General D\u01b0\u01a1ng V\u0103n Minh takes over as leader of South Vietnam.",12],["E0242","1964 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",3,"General Nguy\u1ec5n Kh\u00e1nh leads a bloodless military coup d'\u00e9tat, replacing D\u01b0\u01a1ng V\u0103n Minh as Prime Minister of South Vietnam.",12],["E0243","1964 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",3,"Vietnam War: Attack on USNS Card \u2013 An explosion caused by Viet Cong commandos causes escort carrier USNS Card to sink in the port of Saigon.",12],["E0244","1964 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",3,"Vietnam War: At a rally in Saigon, South Vietnamese Prime Minister Nguy\u1ec5n Kh\u00e1nh calls for expanding the war into North Vietnam.",12],["E0245","1964 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",3,"Vietnam War: Viet Cong forces attack a provincial capital, killing 11 South Vietnamese military personnel and 40 civilians (30 of which are children).",12],["E0246","1964 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",3,"Vietnam War: The U.S. sends 5,000 more military advisers to South Vietnam, bringing the total number of United States forces in Vietnam to 21,000.",12],["E0247","1964 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",3,"Vietnam War: United States destroyer Maddox is attacked in the Gulf of Tonkin. Air support from the carrier USS Ticonderoga sinks one gunboat, while the other two leave the battle.",12],["E0248","1964 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",3,"Vietnam War: Operation Pierce Arrow \u2013 Aircraft from carriers USS Ticonderoga and USS Constellation bomb North Vietnam in retaliation for strikes against U.S. destroyers in the Gulf of Tonkin.",12],["E0249","1964 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",3,"Vietnam War: The United States Congress passes the Gulf of Tonkin Resolution, giving U.S. President Lyndon B. Johnson broad war powers to deal with North Vietnamese attacks on U.S. forces.",12],["E0250","1964 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",3,"Vietnam War: In a coup, General Nguy\u1ec5n Kh\u00e1nh replaces D\u01b0\u01a1ng V\u0103n Minh as South Vietnam's chief of state and establishes a new constitution, drafted partly by the U.S. Embassy.",12],["E0251","1965 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",3,"Vietnam War: Korean People's Army Air Force sent 200 pilots to Vietnam.",12],["E0252","1965 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",3,"Vietnam War: Operation Rolling Thunder \u2013 The United States Air Force 2nd Air Division, United States Navy and South Vietnam Air Force begin a 3\u00bd-year aerial bombardment campaign against North Vietnam.",12],["E0253","1965 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",3,"Vietnam War: Some 3,500 United States Marines arrive in Da Nang, South Vietnam, becoming the first American ground combat troops in Vietnam.",12],["E0255","1965 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",3,"Vietnam War \u2013 Battle of \u0110\u1ed3ng Xo\u00e0i: About 1,500 Viet Cong mount a mortar attack on \u0110\u1ed3ng Xo\u00e0i, overrunning its military headquarters and the adjoining militia compound.",12],["E0256","1965 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",3,"Vietnam War: Four F-4C Phantoms escorting a bombing raid at Kang Chi are targeted by antiaircraft missiles, in the first such attack against American planes in the war. One is shot down and the other 3 sustain damage.",12],["E0257","1965 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",3,"Vietnam War: U.S. President Lyndon B. Johnson announces his order to increase the number of United States troops in South Vietnam from 75,000 to 125,000, and to more than double the number of men drafted per month - from 17,000 to 35,000.",12],["E0258","1965 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",3,"Vietnam War \u2013 Operation Starlite: 5,500 United States Marines destroy a Viet Cong stronghold on the Van Tuong peninsula in Qu\u1ea3ng Ng\u00e3i Province, in the first major American ground battle of the war. The Marines were tipped-off by a Viet Cong deserter who said that there was an attack planned against the U.S. base at Chu Lai.",12],["E0259","1965 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",3,"Vietnam War: An USAF F-104 Starfighter piloted by Captain Philip Eldon Smith is shot down by a Chinese MiG-19 Farmer. The pilot is held until 15 March 1973.",12],["E0261","1965 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",3,"Vietnam War: Near Da Nang, United States Marines repel an intense attack by Viet Cong forces, killing 56 guerrillas. A sketch of Marine positions is found on the dead body of a 13-year-old Vietnamese boy who sold drinks to the Marines the day before.",12],["E0262","1965 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",3,"Vietnam War \u2013 Operation Hump: The United States Army 173rd Airborne is ambushed by over 1,200 Viet Cong.",12],["E0263","1965 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",4,"Vietnam War \u2013 Battle of Ia Drang: In the Ia Drang Valley of the Central Highlands in Vietnam, the first major engagement of the war between regular United States and North Vietnamese forces begins.",16],["E0264","1965 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",3,"Vietnam War: In response to U.S. President Lyndon B. Johnson's call for \"more flags\" in Vietnam, Philippines President-elect Ferdinand Marcos announces he will send troops to help fight in South Vietnam.",12],["E0266","1966 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",3,"The South Vietnamese army besieges Da Nang.",12],["E0267","1966 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",3,"Vietnam War: U.S. planes begin bombing Hanoi and Haiphong.",12],["E0269","1966 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",3,"A Warsaw Pact conference ends with a promise to support North Vietnam.",12],["E0270","1966 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",3,"A USAF F-4C Phantom #63-7599 was shot down by a North Vietnamese SAM-2 45 miles (72 km) northeast of Hanoi, in the first loss of a US aircraft to a Vietnamese SAM in the Vietnam War.",12],["E0271","1966 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",3,"Vietnam War \u2013 Battle of Long Tan: D Company, 6th Battalion of the Royal Australian Regiment, meets and defeats a Viet Cong force estimated to be four times larger, in Phuoc Tuy Province, Republic of Vietnam.",12],["E0273","1966 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",3,"Vietnam War: B\u00ecnh Tai massacre.",12],["E0274","1966 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",3,"Negotiations about the Vietnam War begin in Manila, Philippines.",12],["E0275","1966 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",3,"Vietnam War: B\u00ecnh H\u00f2a massacre.",12],["E0276","1967 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",3,"Vietnam War: USMC and ARVN troops launch Operation Deckhouse Five in the Mekong Delta.",12],["E0277","1967 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",3,"Vietnam War: Operation Cedar Falls starts.",12],["E0278","1967 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",3,"Vietnam War: The People's Republic of China agrees to give North Vietnam an undisclosed amount of aid in the form of a grant.",12],["E0279","1967 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",3,"Two U.S. Navy jets stray into the airspace of the People's Republic of China following an attack on a target in North Vietnam and are shot down. Lt. Robert J. Flynn, the only survivor, is captured alive and will be held prisoner by China until 1973.",12],["E0281","1967 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",3,"Vietnam War \u2013 Operation Swift: The United States Marines launch a search and destroy mission in Qu\u1ea3ng Nam and Qu\u1ea3ng T\u00edn provinces. The ensuing 4-day battle in Que Son Valley kills 114 Americans and 376 North Vietnamese.",12],["E0282","1967 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",3,"Vietnam War: The Battle of Ong Thanh takes place.",12],["E0283","1967 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",3,"U.S. Navy pilot John McCain is shot down over North Vietnam and taken prisoner. His capture is confirmed two days later, and he remains a prisoner of war for more than five years.",12],["E0284","1967 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",3,"Vietnam War \u2013 Battle of Dak To: Around \u0110\u1eafk T\u00f4 (located about 280 miles north of Saigon near the Cambodian border), heavy casualties are suffered on both sides; U.S. troops narrowly win the battle on 22 November.",12],["E0285","1967 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",3,"Vietnam War: U.S. and South Vietnamese forces engage Viet Cong troops in the Mekong Delta (235 of the 300-strong Viet Cong battalion are killed).",12],["E0286","1968 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",4,"Vietnam War \u2013 Battle of Khe Sanh: One of the most publicized and controversial battles of the war begins, ending on 9 July.",16],["E0287","1968 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",4,"Vietnam War: The Tet Offensive begins, as Viet Cong forces launch a series of surprise attacks across South Vietnam.",16],["E0288","1968 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",3,"Vietnam War: A Viet Cong officer named Nguy\u1ec5n V\u0103n L\u00e9m is executed by Nguy\u1ec5n Ng\u1ecdc Loan, a South Vietnamese National Police Chief. The event is photographed by Eddie Adams. The photo makes headlines around the world, eventually winning the 1969 Pulitzer Prize, and sways U.S. public opinion against the war.",12],["E0289","1968 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",3,"Vietnam War: Phong Nh\u1ecb and Phong Nh\u1ea5t massacre.",12],["E0290","1968 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",3,"Vietnam War: The Tet Offensive is halted; South Vietnam recaptures Hu\u1ebf.",12],["E0291","1968 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",3,"Vietnam War: H\u00e0 My massacre.",12],["E0292","1968 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",3,"Vietnam War: Operation Patrick.",12],["E0293","1968 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",3,"Vietnam War: The First Battle of Saigon ends.",12],["E0294","1968 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",3,"Vietnam War: Battle of Lima Site 85, the largest single ground combat loss of United States Air Force members (12) during the (at this time) secret war later known as the Laotian Civil War.",12],["E0295","1968 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",3,"Vietnam War \u2013 My Lai massacre: American troops kill scores of civilians. The story will first become public in November 1969 and will help undermine public support for the U.S. efforts in Vietnam.",12],["E0296","1968 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",3,"Vietnam War: Operation Cochise Green starts.",12],["E0297","1968 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",3,"Vietnam War: South Vietnamese opposition leader Tr\u01b0\u01a1ng \u0110\u00ecnh Dzu is sentenced to 5 years hard labor, for advocating the formation of a coalition government as a way to move toward an end to the war.",12],["E0298","1968 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",3,"Vietnam War: The Tet Offensive comes to an end in South Vietnam.",12],["E0299","1968 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",3,"Vietnam War \u2013 Operation Sealords: United States and South Vietnamese forces launch a new operation in the Mekong Delta.",12],["E0300","1968 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",3,"Vietnam War: Citing progress in the Paris peace talks, U.S. President Lyndon B. Johnson announces to the nation that he has ordered a complete cessation of \"all air, naval, and artillery bombardment of North Vietnam\" effective 1 November.",12],["E0301","1968 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",3,"Vietnam War: Operation Commando Hunt is initiated to interdict men and supplies on the Ho Chi Minh trail, through Laos into South Vietnam. By the end of the operation, 3 million tons of bombs are dropped on Laos, slowing but not seriously disrupting trail operations.",12],["E0302","1969 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",4,"The Battle of Hamburger Hill, also known as Dong Ap Bia, begins during the Vietnam War.",16],["E0303","1969 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",4,"U.S. President Richard Nixon and South Vietnamese President Nguy\u1ec5n V\u0103n Thi\u1ec7u meet at Midway Island. Nixon announces that 25,000 U.S. troops will be withdrawn by September.",16],["E0304","1969 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",3,"Vietnam War: The very first U.S. troop withdrawals are made.",12],["E0305","1969 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",3,"Vietnam War: U.S. President Richard Nixon declares the Nixon Doctrine, stating that the United States now expects its Asian allies to take care of their own military defense. This starts the \"Vietnamization\" of the war.",12],["E0307","1970 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",3,"Vietnam War \u2013 Operation Jefferson Glenn: The United States 101st Airborne Division and the South Vietnamese 1st Infantry Division initiate a new operation in Thua Thien Province (the operation ends in October 1971).",12],["E0308","1970 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",3,"Vietnam War: U.S. President Richard Nixon announces that the United States will withdraw 40,000 more troops before Christmas.",12],["E0309","1970 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",3,"In Vietnam, the worst monsoon to hit the area in six years causes large floods, kills 293, leaves 200,000 homeless and virtually halts the Vietnam War.",12],["E0310","1970 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",3,"Vietnam War \u2013 Vietnamization: The United States turns control of the air base in the Mekong Delta to South Vietnam.",12],["E0311","1970 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",3,"Vietnam War \u2013 Operation Ivory Coast: A joint Air Force and Army team raids the S\u01a1n T\u00e2y prison camp in an attempt to free American POWs thought to be held there (no Americans are killed, but the prisoners have already moved to another camp; all U.S. POWs are moved to a handful of central prison complexes as a result of this raid).",12],["E0312","1971 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",3,"Vietnam War: Backed by American air and artillery support, South Vietnamese troops invade Laos.",12],["E0313","1971 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",3,"Vietnam War: Australia and New Zealand decide to withdraw their troops from Vietnam.",12],["E0314","1971 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",3,"Vietnam War \u2013 Vietnamization: The total number of American troops still in Vietnam drops to a record low of 196,700 (the lowest since January 1966).",12],["E0315","1971 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",3,"Vietnam War \u2013 Vietnamization: U.S. President Richard M. Nixon sets 1 February 1972, as the deadline for the removal of another 45,000 American troops from Vietnam.",12],["E0317","1972 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",4,"Vietnam War: The Easter Offensive begins after North Vietnamese forces cross into the Demilitarized Zone (DMZ) of South Vietnam (ends in October 1972)",16],["E0318","1972 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",4,"Vietnam War \u2013 Nguyen Hue Offensive: Prompted by the North Vietnamese offensive, the United States resumes bombing of Hanoi and Haiphong.",16],["E0320","1972 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",3,"Operation Linebacker and Operation Custom Tailor begin with large-scale bombing operations against North Vietnam by tactical fighter aircraft.",12],["E0321","1972 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",3,"Vietnam War: Associated Press photographer Nick Ut takes his Pulitzer Prize-winning photograph of a naked nine-year-old Phan Thi Kim Phuc running down a road after being burned by napalm.",12],["E0324","1972 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",3,"Vietnam War \u2013 Vietnamization: The United States Army turns over the massive Long Binh military base to South Vietnam.",12],["E0325","1972 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",3,"Vietnam War: The United States loses its first B-52 Stratofortress of the war.",12],["E0326","1972 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",3,"The Christmas bombing of North Vietnam causes widespread criticism of the U.S. and President Richard Nixon.",12],["E0327","1973 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",3,"Vietnam War: Citing progress in peace negotiations, U.S. President Richard Nixon announces the suspension of offensive action in North Vietnam.",12],["E0328","1973 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",5,"U.S. involvement in the Vietnam War ends with the signing of the Paris Peace Accords.",20],["E0330","1973 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",5,"The U.S. bombing of Cambodia ends, officially halting 12 years of combat activity in Southeast Asia according to the Case\u2013Church Amendment-an act that prohibites military operations in Laos, Cambodia, and North and South Vietnam as a follow-up of the Paris Peace Accords.",20],["E0331","1974 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",3,"Vietnam War: The battle of the Paracel Islands between People's Republic of China and South Vietnam. This is the most famous and the only major battle involve China in Vietnam War.",12],["E0332","1975 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",3,"In Hanoi, North Vietnam, the Politburo approves the final military offensive against South Vietnam.",12],["E0333","1975 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",3,"Vietnam War: North Vietnamese troops attack Ban M\u00ea Thu\u1ed9t, South Vietnam, on their way to capturing Saigon.",12],["E0334","1975 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",4,"Vietnam War: South Vietnam President Nguy\u1ec5n V\u0103n Thi\u1ec7u orders the Central Highlands evacuated. This turns into a mass exodus involving troops and civilians (the Convoy of Tears).",16],["E0335","1975 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",3,"Vietnam War: The first military Operation Babylift flight, C5A 80218, crashes 27 minutes after takeoff, killing 138 on board; 176 survive the crash.",12],["E0336","1975 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",3,"Vietnam War: As North Vietnamese Army forces close in on the South Vietnamese capital Saigon, the Australian Embassy is closed and evacuated, almost 10 years to the day since the first Australian troop commitment to South Vietnam.",12],["E0337","1975 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",3,"Operation Frequent Wind \u2013 Americans and their allies are evacuated from South Vietnam by helicopter.",12],["E0338","1975 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",3,"North Vietnam concludes its East Sea Campaign by capturing all of the Spratly Islands that were being held by South Vietnam.",12],["E0339","1975 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",5,"The Vietnam War ends with the Fall of Saigon: The Vietnam War concludes as Communist forces from North Vietnam take Saigon, resulting in mass evacuation of the remaining American troops and South Vietnam civilians. As the capital is taken, South Vietnam surrenders unconditionally and is replaced with the temporary Provisional Government.",20],["E0340","1975 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",4,"The Cold War between Cambodia and Vietnam begins, which eventually leads to the Cambodian\u2013Vietnamese War.",16],["E0460","1975 CE","Reunified Socialist Republic and postwar conflicts","Military",4,"Khmer Rouge forces attacked Ph\u00fa Qu\u1ed1c and Th\u1ed5 Chu in May 1975.",16],["E0461","1975 CE","Reunified Socialist Republic and postwar conflicts","Military",4,"Border conflicts with the Khmer Rouge escalated from 1975 to 1978 before Vietnam's counteroffensive.",16],["E0346","1978 CE","Reunified Socialist Republic and postwar conflicts","Military",3,"25-year \"Treaty of Friendship and Cooperation\" with the Soviet Union.",12],["E0347","1978 CE","Reunified Socialist Republic and postwar conflicts","Military",3,"Vietnam launches a major offensive against the Khmer Rouge of Cambodia.",12],["E0348","1979 CE","Reunified Socialist Republic and postwar conflicts","Military",4,"The People's Republic of China invades northern Vietnam, launching the Sino-Vietnamese War. The war ended with no border changes on 16 March.",16],["E0462","1979 CE","Reunified Socialist Republic and postwar conflicts","Military",5,"Vietnamese
