3 ch\u00ednh.",16],["E0046","661 BCE","V\u0103n Lang \u002f H\u00f9ng Kings","Politics",4,"The last H\u00f9ng king of the Canh line ended his rule of V\u0103n Lang.",16],["E0050","569 BCE","V\u0103n Lang \u002f H\u00f9ng Kings","Politics",4,"The last H\u00f9ng king of the T\u00e2n line ended his rule of V\u0103n Lang.",16],["E0054","470 BCE","V\u0103n Lang \u002f H\u00f9ng Kings","Politics",4,"The last H\u00f9ng king of the Nh\u00e2m line ended his rule of V\u0103n Lang.",16],["E0394","208 BCE","Nanyue \u002f Tri\u1ec7u rule","Politics",5,"Tri\u1ec7u \u0110\u00e0 annexed \u00c2u L\u1ea1c; the source gives 208 BCE or 179 BCE as possible dates.",20],["E0065","203 BCE","Nanyue \u002f Tri\u1ec7u rule","Politics",5,"Zhao Tuo declared himself king of Nanyue, with his capital in modern Panyu, Guangzhou.",20],["E0068","196 BCE","Nanyue \u002f Tri\u1ec7u rule","Politics",4,"The Han official Lu Jia gave Zhao Tuo a seal recognizing him as king of Nanyue in exchange for his nominal submission to the Han emperor.",16],["E0075","179 BCE","Nanyue \u002f Tri\u1ec7u rule","Politics",4,"Luy L\u00e2u was founded.",16],["E0076","179 BCE","Nanyue \u002f Tri\u1ec7u rule","Politics",4,"Zhao Tuo died. He was succeeded as king of Nanyue by his grandson Zhao Mo.",16],["E0094","229 CE","Second Chinese domination","Politics",4,"Sun Quan declared himself emperor, founding the state of Eastern Wu, separating from the Han dynasty.",16],["E0097","545 CE","V\u1ea1n Xu\u00e2n \u002f Early L\u00fd and Tri\u1ec7u Vi\u1ec7t V\u01b0\u01a1ng","Politics",4,"The Liang general Emperor Wu of Chen launched a surprise attack on the V\u1ea1n Xu\u00e2n capital Long Bi\u00ean, forcing L\u00fd Nam \u0110\u1ebf and the imperial administration to flee to the Gia Ninh Citadel in modern Vi\u1ec7t Tr\u00ec.",16],["E0105","571 CE","V\u1ea1n Xu\u00e2n \u002f Early L\u00fd and Tri\u1ec7u Vi\u1ec7t V\u01b0\u01a1ng","Politics",4,"H\u1eadu L\u00fd Nam \u0110\u1ebf surprised and conquered Tri\u1ec7u Vi\u1ec7t V\u01b0\u01a1ng and moved his capital to Phong Ch\u00e2u.",16],["E0400","679 CE","Third Chinese domination \u002f Annam period","Politics",4,"Under Tang rule, the former V\u1ea1n Xu\u00e2n area became part of the An Nam Protectorate system.",16],["E0401","866 CE","Third Chinese domination \u002f Annam period","Politics",4,"After instability and attacks by neighboring powers, the Tang restored control and renamed the region T\u0129nh H\u1ea3i qu\u00e2n in 866.",16],["E0402","905 CE","Third Chinese domination \u002f Annam period","Politics",5,"Kh\u00fac Th\u1eeba D\u1ee5 took control of \u0110\u1ea1i La as Tang power weakened, beginning a period of Vietnamese self-rule.",20],["E0403","907 CE","Third Chinese domination \u002f Annam period","Politics",4,"Kh\u00fac H\u1ea1o continued the Kh\u00fac administration and introduced reforms summarized as 'khoan th\u1ee9 s\u1ee9c d\u00e2n'.",16],["E0407","937 CE","Third Chinese domination \u002f Annam period","Politics",4,"D\u01b0\u01a1ng \u0110\u00ecnh Ngh\u1ec7 was killed by his adopted son Ki\u1ec1u C\u00f4ng Ti\u1ec5n; Ng\u00f4 Quy\u1ec1n then moved against Ki\u1ec1u C\u00f4ng Ti\u1ec5n.",16],["E0408","939 CE","Ng\u00f4 dynasty and Twelve Warlords transition","Politics",5,"After defeating Southern Han, Ng\u00f4 Quy\u1ec1n proclaimed himself king in 939.",20],["E0409","968 CE","\u0110inh dynasty \u002f \u0110\u1ea1i C\u1ed3 Vi\u1ec7t","Politics",5,"\u0110inh B\u1ed9 L\u0129nh proclaimed himself emperor, founded the \u0110inh dynasty and named the country \u0110\u1ea1i C\u1ed3 Vi\u1ec7t.",20],["E0410","980 CE","Early L\u00ea dynasty","Politics",5,"L\u00ea Ho\u00e0n came to the throne and founded the Early L\u00ea dynasty.",20],["E0115","981 CE","Early L\u00ea dynasty","Politics",5,"L\u00ea Ho\u00e0n declared himself emperor at Hoa L\u01b0.",20],["E0120","1009 CE","L\u00fd dynasty","Politics",4,"The imperial court acclaimed L\u00fd Th\u00e1i T\u1ed5 emperor of \u0110\u1ea1i C\u1ed3 Vi\u1ec7t.",16],["E0121","1010 CE","L\u00fd dynasty","Politics",4,"L\u00fd Th\u00e1i T\u1ed5 issued the chi\u1ebfu d\u1eddi \u0111\u00f4, an edict ordering the transfer of the capital from Hoa L\u01b0 to \u0110\u1ea1i La.",16],["E0411","1054 CE","L\u00fd dynasty","Politics",5,"L\u00fd Th\u00e1nh T\u00f4ng changed the country name to \u0110\u1ea1i Vi\u1ec7t in 1054.",20],["E0132","1226 CE","Tr\u1ea7n dynasty","Politics",4,"Tr\u1ea7n Th\u00e1i T\u00f4ng was crowned emperor of \u0110\u1ea1i Vi\u1ec7t.",16],["E0134","1278 CE","Tr\u1ea7n dynasty","Politics",4,"Tr\u1ea7n Th\u00e1nh T\u00f4ng ceded the throne to his son Tr\u1ea7n Nh\u00e2n T\u00f4ng.",16],["E0139","1293 CE","Tr\u1ea7n dynasty","Politics",4,"Tr\u1ea7n Nh\u00e2n T\u00f4ng ceded the throne to his son Tr\u1ea7n Anh T\u00f4ng.",16],["E0143","1400 CE","H\u1ed3 dynasty \u002f \u0110\u1ea1i Ngu","Politics",5,"H\u1ed3 Qu\u00fd Ly overthrew the \u0110\u1ea1i Vi\u1ec7t emperor, enthroned himself, renamed the country \u0110\u1ea1i Ngu and moved the capital to the citadel of the H\u1ed3 dynasty.",20],["E0145","1401 CE","H\u1ed3 dynasty \u002f \u0110\u1ea1i Ngu","Politics",4,"H\u1ed3 Qu\u00fd Ly ceded the throne to his son H\u1ed3 H\u00e1n Th\u01b0\u01a1ng.",16],["E0416","1407 CE","Ming occupation and Lam S\u01a1n uprising","Politics",5,"Ming forces invaded \u0110\u1ea1i Ngu and began the fourth period of Chinese domination.",20],["E0147","1428 CE","Later L\u00ea dynasty \u002f early consolidated L\u00ea","Politics",5,"L\u00ea L\u1ee3i was declared emperor of an independent \u0110\u1ea1i Vi\u1ec7t.",20],["E0149","1460 CE","Later L\u00ea dynasty \u002f early consolidated L\u00ea","Politics",4,"L\u00ea Th\u00e1nh T\u00f4ng was crowned emperor of \u0110\u1ea1i Vi\u1ec7t.",16],["E0158","1527 CE","M\u1ea1c dynasty and L\u00ea\u2013M\u1ea1c conflict","Politics",4,"M\u1ea1c \u0110\u0103ng Dung forced Emperor L\u00ea Cung Ho\u00e0ng to abdicate, establishing the M\u1ea1c dynasty.",16],["E0418","1533 CE","M\u1ea1c dynasty and L\u00ea\u2013M\u1ea1c conflict","Politics",4,"The Later L\u00ea restoration began in 1533 with help from Nguy\u1ec5n Kim, controlling territory from Thanh H\u00f3a toward B\u00ecnh \u0110\u1ecbnh.",16],["E0419","1558 CE","Restored L\u00ea and Tr\u1ecbnh\u2013Nguy\u1ec5n division","Politics",4,"Nguy\u1ec5n Ho\u00e0ng moved to Thu\u1eadn H\u00f3a, beginning the process that later formed the Nguy\u1ec5n lords' southern base.",16],["E0420","1627 CE","Restored L\u00ea and Tr\u1ecbnh\u2013Nguy\u1ec5n division","Politics",5,"The Tr\u1ecbnh\u2013Nguy\u1ec5n conflict produced two separate political zones, \u0110\u00e0ng Ngo\u00e0i and \u0110\u00e0ng Trong, divided by the Gianh River.",20],["E0163","1778 CE","T\u00e2y S\u01a1n period","Politics",5,"Nguy\u1ec5n V\u0103n Nh\u1ea1c proclaimed himself emperor of \u0110\u1ea1i Vi\u1ec7t with his capital at Quy Nh\u01a1n.",20],["E0431","1786 CE","T\u00e2y S\u01a1n period","Politics",5,"The T\u00e2y S\u01a1n movement defeated both northern and southern ruling houses, ending the long division of the country.",20],["E0171","1788 CE","T\u00e2y S\u01a1n period","Politics",5,"Nguy\u1ec5n V\u0103n Nh\u1ea1c's younger brother Nguy\u1ec5n V\u0103n Hu\u1ec7 proclaimed himself emperor of \u0110\u1ea1i Vi\u1ec7t. Nguy\u1ec5n V\u0103n Nh\u1ea1c relinquished the title, taking that of king instead.",20],["E0174","1792 CE","T\u00e2y S\u01a1n period","Politics",4,"Nguy\u1ec5n V\u0103n Hu\u1ec7 died, probably from a stroke. He was succeeded by his young son Nguy\u1ec5n Quang To\u1ea3n.",16],["E0180","1802 CE","Nguy\u1ec5n dynasty \u002f independent monarchy","Politics",4,"Emperor C\u1ea3nh Th\u1ecbnh died, Emperor Gia Long became ruler of Vietnam.",16],["E0433","1802 CE","Nguy\u1ec5n dynasty \u002f independent monarchy","Politics",4,"Gia Long established Hu\u1ebf as the Nguy\u1ec5n capital and built a centralized monarchy continued by Minh M\u1ea1ng.",16],["E0432","1804 CE","Nguy\u1ec5n dynasty \u002f independent monarchy","Politics",5,"Gia Long changed the country name from \u0110\u1ea1i Vi\u1ec7t to Vi\u1ec7t Nam in 1804.",20],["E0184","1815 CE","Nguy\u1ec5n dynasty \u002f independent monarchy","Politics",5,"Emperor Gia Long (1802\u20131820) ended his rule of Vietnam.",20],["E0189","1833 CE","Nguy\u1ec5n dynasty \u002f independent monarchy","Politics",4,"Emperor Minh M\u1ea1ng (1820\u20131841) ended his rule of Vietnam.",16],["E0193","1847 CE","Nguy\u1ec5n dynasty \u002f independent monarchy","Politics",4,"Emperor Thi\u1ec7u Tr\u1ecb (1841\u20131847) ended his rule of Vietnam.",16],["E0203","1883 CE","French conquest and early colonial takeover","Politics",4,"Emperor T\u1ef1 \u0110\u1ee9c (1847\u20131883) ended his rule of Vietnam.",16],["E0436","1887 CE","French colonial Vietnam \u002f French Indochina","Politics",5,"By 1887, France had organized a relatively complete colonial administration under the Indochina Governor-General system.",20],["E0209","1888 CE","French colonial Vietnam \u002f French Indochina","Politics",4,"Emperor \u0110\u1ed3ng Kh\u00e1nh (1885\u20131889) ended his rule of Vietnam.",16],["E0212","1906 CE","French colonial Vietnam \u002f French Indochina","Politics",4,"The Duy T\u00e2n movement, initiated by Phan Ch\u00e2u Trinh, was launched.",16],["E0440","1927 CE","French colonial Vietnam \u002f French Indochina","Politics",4,"Vietnamese nationalists influenced by Sun Yat-sen's Three Principles formed the Vi\u1ec7t Nam Qu\u1ed1c d\u00e2n \u0110\u1ea3ng in the late 1920s.",16],["E0215","1930 CE","French colonial Vietnam \u002f French Indochina","Politics",4,"Emperor B\u1ea3o \u0110\u1ea1i (r. 1926\u20131945) became ruler of Vietnam.",16],["E0443","1941 CE","French colonial Vietnam \u002f French Indochina","Politics",5,"Vi\u1ec7t Minh was founded in 1941 as an independence front led from P\u1eafc B\u00f3 by H\u1ed3 Ch\u00ed Minh after his return to Vietnam.",20],["E0218","1945 CE","August Revolution and First Indochina War","Politics",4,"The Empire of Vietnam is established under Japanese sponsorship.",16],["E0219","1945 CE","August Revolution and Firs nial conquest","Colonial period","Colonial period","Colonial period","Colonial period","Colonial period","Colonial period","Independence and decolonization","Independence and decolonization","Colonial period","Colonial period","Independence and decolonization","Independence and decolonization","Independence and decolonization","Cold War \u002f national division","Cold War \u002f national division","Cold War \u002f national division","Cold War \u002f national division","Cold War \u002f national division","Cold War \u002f national division","Postwar socialist state","Postwar socialist state","Postwar socialist state","Reform era","Reform era","Reform era","Contemporary period"],"yaxis":"y","type":"scatter"},{"customdata":[["E0059","257 BCE","\u00c2u L\u1ea1c","Military",5,"Th\u1ee5c Ph\u00e1n, ruler of the \u00c2u Vi\u1ec7t, invaded and conquered V\u0103n Lang. He renamed the country \u00c2u L\u1ea1c and took the regnal name An D\u01b0\u01a1ng V\u01b0\u01a1ng, ruling as king from C\u1ed5 Loa Citadel.",20],["E0393","214 BCE","\u00c2u L\u1ea1c","Military",4,"The source states that the \u00c2u Vi\u1ec7t\u2013L\u1ea1c Vi\u1ec7t alliance defeated a Qin invasion before or during the formation of \u00c2u L\u1ea1c.",16],["E0062","207 BCE","Nanyue \u002f Tri\u1ec7u rule","Military",4,"The Qin general Zhao Tuo captured C\u1ed5 Loa Citadel. An D\u01b0\u01a1ng V\u01b0\u01a1ng fled and later committed suicide.",16],["E0070","183 BCE","Nanyue \u002f Tri\u1ec7u rule","Military",4,"Zhao Tuo sacked the Han capital Chang'an.",16],["E0074","179 BCE","Nanyue \u002f Tri\u1ec7u rule","Military",4,"In exchange for the restoration of his family in modern Zhengding County and the withdrawal of Han forces from the Nanyue border, Zhao Tuo renounced the title emperor and pledged submission to the Han dynasty.",16],["E0082","111 BCE","First Chinese domination","Military",5,"Han conquest of Nanyue: Han forces invaded Nanyue. Zhao Jiande was captured in flight and executed. The zhou of Jiaozhou was organized on the territory of the defunct Nanyue and divided into the commanderies of Nanhai, Cangwu, Yulin, Jiaozhi, Hepu, Zhuya, Taner, and Jiuzhen. Shi Dai was appointed its governor.",20],["E0092","40 CE","Tr\u01b0ng Sisters uprising","Military",4,"Trung sisters' rebellion: The Tr\u01b0ng Sisters launched a rebellion against Han authority in the Red River Delta.",16],["E0093","43 CE","Second Chinese domination","Military",4,"Trung sisters' rebellion: the Tr\u01b0ng Sisters committed suicide by drowning themselves before The Han general Ma Yuan could capture them.",16],["E0397","43 CE","Tr\u01b0ng Sisters uprising","Military",5,"Han general M\u00e3 Vi\u1ec7n suppressed the Tr\u01b0ng Sisters' uprising after three years of autonomy.",20],["E0095","246 CE","Second Chinese domination","Military",4,"Lady Tri\u1ec7u uprising.",16],["E0399","541 CE","Second Chinese domination","Military",5,"L\u00fd B\u00ed rose against Liang rule in 541, preceding the establishment of V\u1ea1n Xu\u00e2n in 544.",20],["E0096","544 CE","V\u1ea1n Xu\u00e2n \u002f Early L\u00fd and Tri\u1ec7u Vi\u1ec7t V\u01b0\u01a1ng","Military",5,"Following his rebellion and expulsion of Liang forces from Jiaozhou, L\u00fd Nam \u0110\u1ebf was proclaimed emperor of V\u1ea1n Xu\u00e2n.",20],["E0098","546 CE","V\u1ea1n Xu\u00e2n \u002f Early L\u00fd and Tri\u1ec7u Vi\u1ec7t V\u01b0\u01a1ng","Military",4,"L\u00fd Nam \u0110\u1ebf was forced to retreat to Khu\u1ea5t L\u00e3o Cave, where he reorganized his army under the command of Tri\u1ec7u Vi\u1ec7t V\u01b0\u01a1ng.",16],["E0099","547 CE","V\u1ea1n Xu\u00e2n \u002f Early L\u00fd and Tri\u1ec7u Vi\u1ec7t V\u01b0\u01a1ng","Military",4,"V\u1ea1n Xu\u00e2n forces defended D\u1ea1 Tr\u1ea1ch in modern Kho\u00e1i Ch\u00e2u District from Liang forces.",16],["E0101","548 CE","V\u1ea1n Xu\u00e2n \u002f Early L\u00fd and Tri\u1ec7u Vi\u1ec7t V\u01b0\u01a1ng","Military",4,"L\u00fd Nam \u0110\u1ebf was assassinated in modern Laos.",16],["E0102","550 CE","V\u1ea1n Xu\u00e2n \u002f Early L\u00fd and Tri\u1ec7u Vi\u1ec7t V\u01b0\u01a1ng","Military",5,"Tri\u1ec7u Vi\u1ec7t V\u01b0\u01a1ng expelled Liang forces from V\u1ea1n Xu\u00e2n and reestablished the capital at Long Bi\u00ean.",20],["E0106","602 CE","Third Chinese domination \u002f Annam period","Military",4,"Sui\u2013Former L\u00fd War: Sui conquered V\u1ea1n Xu\u00e2n following a brief rebellion by H\u1eadu L\u00fd Nam \u0110\u1ebf.",16],["E0405","923 CE","Third Chinese domination \u002f Annam period","Military",4,"Southern Han forces defeated Kh\u00fac Th\u1eeba M\u1ef9; the source explains that 923 and 930 are both found in historical traditions.",16],["E0406","931 CE","Third Chinese domination \u002f Annam period","Military",4,"D\u01b0\u01a1ng \u0110\u00ecnh Ngh\u1ec7 defeated Southern Han forces and took control of Giao Ch\u00e2u.",16],["E0109","938 CE","Ng\u00f4 dynasty and Twelve Warlords transition","Military",5,"Battle of B\u1ea1ch \u0110\u1eb1ng: Ng\u00f4 Quy\u1ec1n defeated the Southern Han kingdom at the Battle of B\u1ea1ch \u0110\u1eb1ng north of modern Haiphong and ended 1,000 years of Chinese domination dating back to 111 BC under the Han dynasty, founding the Ng\u00f4 dynasty.",20],["E0111","979 CE","\u0110inh dynasty \u002f \u0110\u1ea1i C\u1ed3 Vi\u1ec7t","Military",4,"Emperor \u0110inh B\u1ed9 L\u0129nh of \u0110\u1ea1i C\u1ed3 Vi\u1ec7t was assassinated along with his crown prince \u0110inh Li\u1ec5n by a minor palace official. His surviving son, the young \u0110inh Ph\u1ebf \u0110\u1ebf, succeeded him under the regency of the commander-in-chief L\u00ea Ho\u00e0n.",16],["E0133","1258 CE","Tr\u1ea7n dynasty","Military",5,"Mongol invasions of Vietnam: The Mongol Empire invaded \u0110\u1ea1i Vi\u1ec7t and conquered the capital at modern Hanoi. Tr\u1ea7n Th\u00e1i T\u00f4ng fled to an island.",20],["E0137","1285 CE","Tr\u1ea7n dynasty","Military",5,"Mongol invasions of Vietnam: The \u0110\u1ea1i Vi\u1ec7t commander-in-chief Tr\u1ea7n H\u01b0ng \u0110\u1ea1o drew out and harassed a Yuan invasion force, forcing their retreat.",20],["E0138","1287 CE","Tr\u1ea7n dynasty","Military",5,"Mongol invasions of Vietnam: The Mongol navy was destroyed, forcing the army, left without provisions, to begin its retreat from \u0110\u1ea1i Vi\u1ec7t.",20],["E0144","1400 CE","H\u1ed3 dynasty \u002f \u0110\u1ea1i Ngu","Military",4,"The Cham-Vietnamese War (1400\u20131407) began.",16],["E0146","1406 CE","H\u1ed3 dynasty \u002f \u0110\u1ea1i Ngu","Military",5,"Ming\u2013H\u1ed3 War: Ming forces captured the \u0110\u1ea1i Ngu capitals.",20],["E0417","1407 CE","Ming occupation and Lam S\u01a1n uprising","Military",4,"Forces of the Later Tr\u1ea7n rose against Ming rule from 1407 to 1413 but were defeated.",16],["E0430","1771 CE","T\u00e2y S\u01a1n period","Military",5,"The T\u00e2y S\u01a1n uprising began in Quy Nh\u01a1n and grew into a movement that defeated the Nguy\u1ec5n and Tr\u1ecbnh regimes.",20],["E0162","1778 CE","T\u00e2y S\u01a1n period","Military",4,"The forces of the T\u00e2y S\u01a1n dynasty took Gia \u0110\u1ecbnh in modern Saigon and massacred the Nguy\u1ec5n lords, the de facto rulers of southern \u0110\u1ea1i Vi\u1ec7t, sparing only the young Nguy\u1ec5n Th\u1ebf T\u1ed5.",16],["E0165","1785 CE","T\u00e2y S\u01a1n period","Military",4,"Battle of R\u1ea1ch G\u1ea7m-Xo\u00e0i M\u00fat: \u0110\u1ea1i Vi\u1ec7t forces under a banner of truce surprised and defeat a Siamese force, then invade with the intention of installing Nguy\u1ec5n Th\u1ebf T\u1ed5 on the throne, on the Mekong River in modern Ti\u1ec1n Giang Province.",16],["E0435","1873 CE","French conquest and early colonial takeover","Military",5,"After taking Nam K\u1ef3, France expanded into the rest of Vietnam through complex conflicts in B\u1eafc K\u1ef3 from 1873 to 1886.",20],["E0441","1930 CE","French colonial Vietnam \u002f French Indochina","Military",4,"The failed Y\u00ean B\u00e1i uprising in 1930 severely weakened Vi\u1ec7t Nam Qu\u1ed1c d\u00e2n \u0110\u1ea3ng.",16],["E0442","1940 CE","French colonial Vietnam \u002f French Indochina","Military",4,"Japan entered Indochina in 1940 and reached an arrangement with Vichy France for control.",16],["E0444","1945 CE","French colonial Vietnam \u002f French Indochina","Military",5,"Japan overthrew French colonial administration in March 1945 and backed the Empire of Vietnam.",20],["E0450","1946 CE","August Revolution and First Indochina War","Military",5,"War between the Democratic Republic of Vietnam and France broke out in December 1946 after failed negotiations.",20],["E0222","1954 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",5,"Battle of Dien Bien Phu: French troops begin the battle against the Viet Minh in Dien Bien Phu.",20],["E0223","1954 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",5,"Battle of Dien Bien Phu: the Viet Minh capture the main airstrip of Dien Bien Phu. The remaining French Army units there are partially isolated.",20],["E0225","1954 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",5,"Battle of Dien Bien Phu ends in a French defeat.",20],["E0226","1954 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",5,"The Geneva Conference sends French Union forces to the south, and Viet Minh forces to the north, of a ceasefire line, and calls for elections to decide the government for all of Vietnam by July 1956. Failure to abide by the terms of the agreement leads to the establishment de facto of regimes of North Vietnam and South Vietnam, and the Vietnam War.",20],["E0228","1955 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",4,"Ng\u00f4 \u0110\u00ecnh Di\u1ec7m proclaims Vietnam to be a republic with himself as its President (following the State of Vietnam referendum on 23 October) and forms the Army of the Republic of Vietnam.",16],["E0229","1955 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",4,"The Vietnam War begins between North Vietnam and South Vietnam; the north is allied with the Viet Cong.",16],["E0233","1961 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",4,"The American involvement in the Vietnam War officially begins, as the first American helicopters arrive in Saigon along with 400 U.S. personnel.",16],["E0235","1963 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",4,"Hu\u1ebf Ph\u1eadt \u0110\u1ea3n shootings: The Army of the Republic of Vietnam opens fire on Buddhists who defy a ban on the flying of the Buddhist flag on Vesak, the birthday of Gautama Buddha, killing 9. Earlier, President Ng\u00f4 \u0110\u00ecnh Di\u1ec7m allowed the flying of the Vatican flag in honour of his brother, Archbishop Ng\u00f4 \u0110\u00ecnh Th\u1ee5c, triggering the Buddhist crisis in South Vietnam.",16],["E0236","1963 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",4,"Hu\u1ebf chemical attacks: The Army of the Republic of Vietnam rains liquid chemicals on the heads of Buddhist protestors, injuring 67 people. The United States threatens to cut off aid to the regime of Ng\u00f4 \u0110\u00ecnh Di\u1ec7m.",16],["E0239","1963 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",4,"X\u00e1 L\u1ee3i Pagoda raids: The Army of the Republic of Vietnam Special Forces loyal to Ng\u00f4 \u0110\u00ecnh Nhu, brother of President Ng\u00f4 \u0110\u00ecnh Di\u1ec7m, vandalise Buddhist pagodas across South Vietnam, arresting thousands and leaving an estimated hundreds dead. In the wake of the raids, the Kennedy administration by Cable 243 orders the Embassy of the United States, Saigon to explore alternative leadership in the country, opening the way towards a coup against Di\u1ec7m.",16],["E0263","1965 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",4,"Vietnam War \u2013 Battle of Ia Drang: In the Ia Drang Valley of the Central Highlands in Vietnam, the first major engagement of the war between regular United States and North Vietnamese forces begins.",16],["E0286","1968 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",4,"Vietnam War \u2013 Battle of Khe Sanh: One of the most publicized and controversial battles of the war begins, ending on 9 July.",16],["E0287","1968 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",4,"Vietnam War: The Tet Offensive begins, as Viet Cong forces launch a series of surprise attacks across South Vietnam.",16],["E0302","1969 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",4,"The Battle of Hamburger Hill, also known as Dong Ap Bia, begins during the Vietnam War.",16],["E0303","1969 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",4,"U.S. President Richard Nixon and South Vietnamese President Nguy\u1ec5n V\u0103n Thi\u1ec7u meet at Midway Island. Nixon announces that 25,000 U.S. troops will be withdrawn by September.",16],["E0317","1972 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",4,"Vietnam War: The Easter Offensive begins after North Vietnamese forces cross into the Demilitarized Zone (DMZ) of South Vietnam (ends in October 1972)",16],["E0318","1972 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",4,"Vietnam War \u2013 Nguyen Hue Offensive: Prompted by the North Vietnamese offensive, the United States resumes bombing of Hanoi and Haiphong.",16],["E0328","1973 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",5,"U.S. involvement in the Vietnam War ends with the signing of the Paris Peace Accords.",20],["E0330","1973 CE","Partition, North\u002fSouth Vietnam, and Vietnam War","Military",5,"The U.S. bombing of Cambodia ends, officially halting 12 years of combat activity in Southeast Asia according to the Case\u2013Church Amendment-an act that prohibites military operations in Laos, Cambodia, and North and South Vietnam as a follow-up of the Paris Peace Accords.",20],["E0334","1975 CE","Partition, North\u002f
